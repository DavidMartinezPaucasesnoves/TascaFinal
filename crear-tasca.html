<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Categorías</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <section class="tareas">
        <div class="menu">
            <h2>Menú</h2>
            <ul>
                <li><div><a href="index.html">Lista de Actividades</a></div></li>
                <li><div><a href="crear-tasca.html">Crear Tarea</a></div></li>
                <li><div><a href="categories.html">Gestión de Categorías</a></div></li>
            </ul>
        </div>

        <div class="workspace-tareas">
            <h1>Crear Tarea Nueva</h1>
            <div class="tareas-box">
                <p>Título:</p>
                <input type="text" id="titulo-tarea">
                <p>Descripción:</p>
                <input type="text" id="desc-tarea">
                <p>Fecha:</p>
                <input type="date" id="fecha-tarea">
                <p>Categoría:</p>
                <select name="categorias" id="selector-categorias" class="dropdown-select">
                </select>
                <p>Prioridad:</p>
                <select id="prioridad-tarea" name="prioridad" class="dropdown-select">
                    <option value="Baja">Baja</option>
                    <option value="Media">Media</option>
                    <option value="Alta">Alta</option>
                </select>
                <button onclick="guardarTarea()">Crear Tarea</button>
            </div>
        </div>
    </section>
    <script src="js/storage.js"></script>
    <script src="js/form-tasca.js"></script>
</body>
</html>
